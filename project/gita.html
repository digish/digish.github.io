<script>
    (function() {
        const IOS_URL = "https://apps.apple.com/us/app/id6756779432";
        const ANDROID_URL = "https://play.google.com/store/apps/details?id=org.komal.bhagvadgeeta";
        const FALLBACK_URL = "https://digish.github.io/project/index.html#bhagvadgita"; 

        const ua = navigator.userAgent || navigator.vendor || window.opera;
        let targetUrl = FALLBACK_URL;
        let platform = "Desktop";

        if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
            targetUrl = IOS_URL;
            platform = "iOS";
        } else if (/android/i.test(ua)) {
            targetUrl = ANDROID_URL;
            platform = "Android";
        }

        document.getElementById('manual-link').href = targetUrl;
        document.getElementById('status').innerText = "Opening " + platform + " Store...";

        // Logging with Beacon to ensure data is sent before redirect
        if (typeof gtag === 'function') {
            gtag('event', 'store_redirect', {
                'app_name': 'Shrimad Bhagavad Gita',
                'platform': platform,
                'target_url': targetUrl,
                'transport_type': 'beacon' // Essential for fast redirects
            });
        }

        // Slight delay to allow the visual "Redirecting" message to be seen
        setTimeout(function() { 
            window.location.replace(targetUrl); 
        }, 1500); 
    })();
</script>
</body>
